modLoader = "javafml"
loaderVersion = "[2,)"
#issueTrackerURL = ""
license = "CC-BY-NC-SA-4.0"

[[mods]]
modId = "lost_lore"
version = "${version}"
displayName = "Cobblemon: Lost Lore"
authors = "Lvnatic, YajatKaul"
description = '''
This addon aims to add the extended canon that is the anime/movies, side games & manga to Cobblemon!
'''
logoFile = "assets/lost_lore/icon.png"

[[dependencies.lost_lore]]
modId = "neoforge"
type = "required"
reason = "Update your Neoforge version!"
versionRange = "[21,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.lost_lore]]
modId = "minecraft"
type = "required"
reason = "HOW did you even manage to open Minecraft without Minecraft?"
versionRange = "[1.21.1,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.lost_lore]]
modId = "architectury"
type = "required"
versionRange = "[13.0.8,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.lost_lore]]
modId = "cobblemon"
type = "required"
reason = "You're missing like the most important mod for this to work. Install/Update it!"
versionRange = "[1.7.3, )"
ordering = "AFTER"
side = "BOTH"

[[dependencies.lost_lore]]
modId = "mega_showdown"
type = "required"
reason = "You're missing like the second most important mod for this to work. Install/Update it!"
versionRange = "[1.8.3+1.7.3+1.21.1,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.lost_lore]]
modId = "accessories"
type = "required"
versionRange = "[1.1.0-beta.52+1.21.1, )"
ordering = "AFTER"
side = "BOTH"

[[dependencies.lost_lore]]
modId = "mr_cobblemon_journeymounts"
type = "incompatible"
versionRange = "*"
reason = "Sadly JourneyMounts breaks stuff including Mewtwo, Lugia, Lucario among other things!"
ordering = "AFTER"
side = "BOTH"

[[dependencies.lost_lore]]
modId = "mr_lasers_additions"
type = "incompatible"
versionRange = "*"
reason = "Sadly breaks Shadow Megas abilities!"
ordering = "AFTER"
side = "BOTH"

[[mixins]]
config = "lost_lore.mixins.json"

[[mixins]]
config = "lost_lore.neo.mixins.json"